name: Bug Report
description: File a bug report.
title: '[Bug]: '
labels:
- bug
assignees:
- xBourner
body:
- type: markdown
  attributes:
    value: Thanks for taking the time to fill out this bug report!
- type: textarea
  id: what-happened
  attributes:
    label: What happened?
    description: Please tell me exactly what happened while using the card. The more
      detailed, the better.
    placeholder: Tell us what you see!
  validations:
    required: true
- type: textarea
  id: to-reproduce
  attributes:
    label: 'To Reproduce:'
    placeholder: Steps to reproduce the behavior
  validations:
    required: true
- type: textarea
  id: screenshots
  attributes:
    label: Screenshots
    placeholder: If applicable, add screenshots to help explain your problem.
- type: dropdown
  id: ha_version
  attributes:
    label: HA Version
    description: What version of HA are you running? Please update version if you
      don't see your running verision in this list.
    options:
    - 2026.7.1
    - 2026.7.0b4
    - 2026.7.0b3
    - 2026.7.0b2
    - 2026.7.0b1
    - 2026.7.0b0
    - 2026.7.0
    - 2026.6.4
    - 2026.6.3
    - 2026.6.2
    - 2026.6.1
    - 2026.6.0b4
    - 2026.6.0b3
    - 2026.6.0b2
    - 2026.6.0b1
    - 2026.6.0b0
    - 2026.6.0
    - 2026.5.4
    - 2026.5.3
    - 2026.5.2
    - 2026.5.1
    - 2026.5.0b4
    - 2026.5.0b3
    - 2026.5.0b2
    - 2026.5.0b1
    - 2026.5.0b0
    - 2026.5.0
    default: 0
  validations:
    required: true
- type: dropdown
  id: card_version
  attributes:
    label: Card Version
    description: What version of the card are you running?
    options: []
    default: 0
  validations:
    required: true
- type: dropdown
  id: browsers
  attributes:
    label: What browsers are you seeing the problem on?
    description: Browser/App
    multiple: true
    options:
    - Firefox
    - Chrome
    - Safari
    - Microsoft Edge
    - HA App on Android
    - HA App on iOS
  validations:
    required: true
- type: checkboxes
  id: terms
  attributes:
    label: Agreement
    options:
    - label: I agree that I updated HA and the card to the latest version and deleted
        my cache or reinstalled the HA app before submitting this bug.
      required: true
